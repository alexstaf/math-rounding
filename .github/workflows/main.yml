name: CI

on:
  push:
    branches: [ '*' ]
    tags: [ '[0-9]+.[0-9]+.[0-9]+*' ]
  pull_request:
    branches: [ 'main' ]

jobs:

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package with numpy and numba
        run: python -m pip install -e ".[numpy,numba]"
      - name: Run tests
        run: python -m unittest discover -s tests -v

  test-without-numpy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package without optional dependencies
        run: python -m pip install -e .
      - name: Run tests (numpy tests skipped)
        run: python -m unittest discover -s tests -v

  build_package:
    needs: [ruff, test, test-without-numpy]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Install build package
        run: python -m pip install build
      - name: Remove dist folder
        run: rm -rf ./dist
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist/*
